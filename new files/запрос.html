<!-- START: DISCRETE CONTACT FORM COMPONENT -->
<div class="oo-contact-form-holder">
    <h4 class="oo-form-h4">Инициировать проверку или выезд инженеров</h4>
    <form class="oo-ajax-form">
        <div class="oo-form-group">
            <input type="text" name="oo-name" placeholder="Ваше имя / Наименование организации" required>
        </div>
        <div class="oo-form-group">
            <input type="tel" name="oo-phone" placeholder="+7 (___) ___-__-__" required>
        </div>
        <div class="oo-form-group">
            <input type="text" name="oo-cadastre" placeholder="Кадастровый номер или адрес объекта (при наличии)">
        </div>
        <div class="oo-form-group">
            <textarea name="oo-message" placeholder="Кратко опишите задачу (например: легализовать пристройку, сделать топосъемку под газ, составить межевой план)"></textarea>
        </div>
        <button type="submit" class="oo-btn-submit">Отправить данные на экспресс-анализ</button>
    </form>
</div>
<!-- END: DISCRETE CONTACT FORM COMPONENT -->
